<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Groups - Magic Friendz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-bg { background-image: linear-gradient(to bottom, rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 1)), url('https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; }
        .text-gradient { background: linear-gradient(to right, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .state-panel { transition: opacity 220ms ease, transform 220ms ease; }
        .state-panel.hidden { opacity: 0; transform: translateY(8px); pointer-events: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans antialiased overflow-x-hidden">
    <div class="min-h-screen flex flex-col transition-opacity duration-500 relative">
        <nav class="w-full p-4 md:p-6 flex justify-between items-center fixed top-0 z-50 glass border-b border-slate-800/50">
            <button type="button" id="brand-home-btn" class="text-xl md:text-2xl font-bold tracking-tighter flex items-center gap-2 text-left hover:opacity-90 active:opacity-80 transition cursor-pointer touch-manipulation" aria-label="Magic Friendz home">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-500 shrink-0" aria-hidden="true"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                Magic<span class="text-purple-500">Friendz</span>
            </button>
            <div class="flex items-center gap-2">
                <button id="sign-out-btn" type="button" class="text-sm bg-slate-800/80 hover:bg-slate-700 text-white border border-slate-600 px-4 py-2 rounded-full font-semibold transition min-h-[44px] touch-manipulation">Sign out</button>
            </div>
        </nav>

        <main class="flex-grow flex items-center justify-center hero-bg px-4 md:px-6 pt-28 md:pt-36 pb-14 overflow-hidden relative">
            <div class="w-full max-w-3xl mx-auto">
                <div class="glass rounded-3xl p-6 md:p-8 shadow-[0_25px_80px_rgba(0,0,0,0.55)] border border-purple-500/20">
                    <p class="text-xs uppercase tracking-widest text-purple-300 mb-3">Signed in workspace</p>
                    <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight mb-2">
                        Your <span class="text-gradient">Magic Friendz</span> groups
                    </h1>
                    <p id="account-email" class="text-sm md:text-base text-slate-300 mb-6"></p>

                    <section id="loading-view" class="state-panel rounded-xl border border-slate-700/70 bg-slate-900/60 p-5">
                        <div class="flex items-center gap-3">
                            <div class="w-5 h-5 rounded-full border-2 border-slate-500 border-t-purple-400 spin" aria-hidden="true"></div>
                            <div>
                                <p id="loading-title" class="text-slate-100 text-sm font-semibold">Preparing your workspace...</p>
                                <p id="loading-subtitle" class="text-slate-400 text-xs mt-0.5">Checking your account and groups.</p>
                            </div>
                        </div>
                    </section>

                    <section id="groups-view" class="state-panel hidden space-y-3"></section>

                    <section id="no-groups-view" class="state-panel hidden rounded-xl border border-amber-500/35 bg-amber-950/20 p-5 space-y-3 mt-1">
                        <h2 class="text-lg font-bold text-white">No groups linked yet</h2>
                        <p class="text-sm text-slate-200">This account is signed in, but does not have access to any group yet.</p>
                        <p class="text-xs text-slate-400">Ask a group owner to invite this email, or create a new group now.</p>
                    </section>

                    <section class="mt-6 rounded-xl border border-purple-500/25 bg-purple-950/20 p-5 space-y-3">
                        <h2 class="text-lg font-bold text-white">Create a new group</h2>
                        <div class="space-y-3">
                            <input id="new-group-name" type="text" placeholder="Group name" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-3 text-sm text-white outline-none focus:border-purple-500 transition min-h-[44px] touch-manipulation placeholder:text-slate-500" />
                            <button id="create-group-btn" type="button" class="w-full sm:w-auto bg-purple-600 hover:bg-purple-500 text-white px-5 py-3 rounded-xl text-sm font-bold transition min-h-[44px] touch-manipulation disabled:opacity-50 disabled:pointer-events-none">Create and open group</button>
                            <p id="create-error" class="hidden text-sm text-red-300"></p>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, isSignInWithEmailLink, signInWithEmailLink } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, collectionGroup, doc, getDoc, getDocs, query, setDoc, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsMhmoUMFqM4tkOFpY8WtllXZ4_QtU1Cs",
            authDomain: "magic-friends-82cc6.firebaseapp.com",
            projectId: "magic-friends-82cc6",
            storageBucket: "magic-friends-82cc6.firebasestorage.app",
            messagingSenderId: "822273509499",
            appId: "1:822273509499:web:1eb431bf22764f96067ade",
            measurementId: "G-LXRC54R98V"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const AUTH_EMAIL_KEY = 'mf_email_for_sign_in';
        const AUTH_DEBUG_LINK_KEY = 'mf_debug_link_id';

        const loadingView = document.getElementById('loading-view');
        const groupsView = document.getElementById('groups-view');
        const noGroupsView = document.getElementById('no-groups-view');
        const accountEmail = document.getElementById('account-email');
        const createError = document.getElementById('create-error');
        const createButton = document.getElementById('create-group-btn');
        const createInput = document.getElementById('new-group-name');
        const signOutButton = document.getElementById('sign-out-btn');
        const loadingTitle = document.getElementById('loading-title');
        const loadingSubtitle = document.getElementById('loading-subtitle');

        function normalizeEmail(email) {
            return String(email || '').trim().toLowerCase();
        }

        function formatGroupSlug(value) {
            return String(value || '')
                .trim()
                .toLowerCase()
                .normalize('NFKD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .slice(0, 60);
        }

        function indexBasePath() {
            const { origin, pathname } = window.location;
            if (pathname.endsWith('/groups.html')) return `${origin}${pathname.replace(/groups\.html$/, 'index.html')}`;
            if (pathname.endsWith('/')) return `${origin}${pathname}index.html`;
            return `${origin}/index.html`;
        }

        function appGroupUrl(groupId) {
            return `${indexBasePath()}?group=${encodeURIComponent(groupId)}`;
        }

        function isManageMode() {
            try {
                return new URLSearchParams(window.location.search).get('manage') === '1';
            } catch (_) {
                return false;
            }
        }

        function goBrandHome() {
            if (!auth.currentUser) {
                window.location.replace(indexBasePath());
                return;
            }
            const target = new URL(window.location.href);
            target.searchParams.set('manage', '1');
            target.searchParams.delete('group');
            window.location.assign(target.toString());
        }

        function stripAuthParamsFromGroupsUrl() {
            try {
                const params = new URLSearchParams(window.location.search);
                ['oobCode', 'apiKey', 'mode', 'lang', 'si'].forEach((k) => params.delete(k));
                const query = params.toString();
                const next = `${window.location.pathname}${query ? `?${query}` : ''}${window.location.hash || ''}`;
                window.history.replaceState({}, '', next);
            } catch (_) {}
        }

        async function tryCompleteEmailSignInOnGroups() {
            if (!isSignInWithEmailLink(auth, window.location.href)) return false;
            let email = window.localStorage.getItem(AUTH_EMAIL_KEY);
            if (!email) {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const encoded = params.get('si');
                    const fromUrl = normalizeEmail(encoded ? decodeURIComponent(encoded) : '');
                    if (fromUrl) {
                        email = fromUrl;
                        window.localStorage.setItem(AUTH_EMAIL_KEY, email);
                    }
                } catch (_) {}
            }
            if (!email) return false;
            await signInWithEmailLink(auth, email, window.location.href);
            window.localStorage.removeItem(AUTH_EMAIL_KEY);
            stripAuthParamsFromGroupsUrl();
            return true;
        }

        function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
        }

        function setLoadingState(title, subtitle = '') {
            loadingTitle.textContent = title;
            loadingSubtitle.textContent = subtitle;
        }

        async function fetchAccessibleGroupsForCurrentUser(user) {
            const email = normalizeEmail(user?.email);
            const uid = user?.uid;
            // #region agent log
            fetch('http://127.0.0.1:7908/ingest/943deae8-0938-4155-ab85-8e8398203a4e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9fd7f9'},body:JSON.stringify({sessionId:'9fd7f9',runId:'run1',hypothesisId:'H1',location:'groups.html:fetchAccessibleGroupsForCurrentUser:entry',message:'group discovery started',data:{hasEmail:!!email,hasUid:!!uid},timestamp:Date.now()})}).catch(()=>{});
            // #endregion
            if (!email || !uid) return [];
            try {
                const groupsById = new Map();
                const addGroup = (groupId, roleHint) => {
                    if (!groupId) return;
                    const existing = groupsById.get(groupId) || { id: groupId, role: 'editor' };
                    if (roleHint === 'owner' || existing.role !== 'owner') existing.role = roleHint || existing.role;
                    groupsById.set(groupId, existing);
                };

                const safeGetDocs = async (q, label) => {
                    try {
                        const result = await getDocs(q);
                        // #region agent log
                        fetch('http://127.0.0.1:7908/ingest/943deae8-0938-4155-ab85-8e8398203a4e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9fd7f9'},body:JSON.stringify({sessionId:'9fd7f9',runId:'run1',hypothesisId:'H2',location:'groups.html:fetchAccessibleGroupsForCurrentUser:safeGetDocsSuccess',message:'group query succeeded',data:{label,count:result.size},timestamp:Date.now()})}).catch(()=>{});
                        // #endregion
                        return result;
                    } catch (error) {
                        // #region agent log
                        fetch('http://127.0.0.1:7908/ingest/943deae8-0938-4155-ab85-8e8398203a4e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9fd7f9'},body:JSON.stringify({sessionId:'9fd7f9',runId:'run1',hypothesisId:'H2',location:'groups.html:fetchAccessibleGroupsForCurrentUser:safeGetDocsCatch',message:'group query failed',data:{label,errorCode:error?.code||'',errorName:error?.name||''},timestamp:Date.now()})}).catch(()=>{});
                        // #endregion
                        return null;
                    }
                };

                const [ownerByUid, ownerByEmail, rosterByEmail] = await Promise.all([
                    safeGetDocs(query(collection(db, 'groups'), where('ownerUid', '==', uid)), 'ownerByUid'),
                    safeGetDocs(query(collection(db, 'groups'), where('ownerEmail', '==', email)), 'ownerByEmail'),
                    safeGetDocs(query(collectionGroup(db, 'roster'), where('email', '==', email)), 'rosterByEmail')
                ]);
            // #region agent log
            fetch('http://127.0.0.1:7908/ingest/943deae8-0938-4155-ab85-8e8398203a4e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9fd7f9'},body:JSON.stringify({sessionId:'9fd7f9',runId:'run1',hypothesisId:'H2',location:'groups.html:fetchAccessibleGroupsForCurrentUser:queryResults',message:'raw query results',data:{ownerByUidCount:ownerByUid?.size??null,ownerByEmailCount:ownerByEmail?.size??null,rosterByEmailCount:rosterByEmail?.size??null},timestamp:Date.now()})}).catch(()=>{});
            // #endregion

            ownerByUid?.docs.forEach((d) => addGroup(d.id, 'owner'));
            ownerByEmail?.docs.forEach((d) => addGroup(d.id, 'owner'));
                rosterByEmail?.docs.forEach((d) => {
                const groupId = d.ref.parent?.parent?.id;
                    addGroup(groupId, 'editor');
                });

                const groups = Array.from(groupsById.values());
            // #region agent log
            fetch('http://127.0.0.1:7908/ingest/943deae8-0938-4155-ab85-8e8398203a4e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9fd7f9'},body:JSON.stringify({sessionId:'9fd7f9',runId:'run1',hypothesisId:'H3',location:'groups.html:fetchAccessibleGroupsForCurrentUser:mergedGroups',message:'merged group candidates',data:{groupCount:groups.length,groupIds:groups.map(g=>g.id)},timestamp:Date.now()})}).catch(()=>{});
            // #endregion
                const withNames = await Promise.all(groups.map(async (g) => {
                    try {
                        const snap = await getDoc(doc(db, 'groups', g.id));
                        if (snap.exists()) {
                            const data = snap.data() || {};
                            return { ...g, name: data.name || g.id };
                        }
                    } catch (_) {}
                    return { ...g, name: g.id };
                }));
                // #region agent log
                fetch('http://127.0.0.1:7908/ingest/943deae8-0938-4155-ab85-8e8398203a4e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9fd7f9'},body:JSON.stringify({sessionId:'9fd7f9',runId:'run1',hypothesisId:'H3',location:'groups.html:fetchAccessibleGroupsForCurrentUser:return',message:'returning discovered groups',data:{groupCount:withNames.length,groupIds:withNames.map(g=>g.id)},timestamp:Date.now()})}).catch(()=>{});
                // #endregion
                return withNames.sort((a, b) => String(a.name || a.id).localeCompare(String(b.name || b.id)));
            } catch (error) {
                // #region agent log
                fetch('http://127.0.0.1:7908/ingest/943deae8-0938-4155-ab85-8e8398203a4e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9fd7f9'},body:JSON.stringify({sessionId:'9fd7f9',runId:'run1',hypothesisId:'H6',location:'groups.html:fetchAccessibleGroupsForCurrentUser:outerCatch',message:'unexpected discovery failure',data:{errorName:error?.name||'',errorCode:error?.code||''},timestamp:Date.now()})}).catch(()=>{});
                // #endregion
                return [];
            }
        }

        function renderGroups(groups) {
            groupsView.innerHTML = '';
            groups.forEach((group) => {
                const card = document.createElement('button');
                card.type = 'button';
                card.className = 'w-full text-left rounded-xl border border-slate-700/70 bg-slate-900/60 p-4 hover:border-purple-500/50 hover:bg-slate-900 transition';
                card.innerHTML = `
                    <div class="flex items-start justify-between gap-3">
                        <div>
                            <p class="text-white font-semibold">${group.name}</p>
                            <p class="text-xs text-slate-400 mt-1">Role: ${group.role}</p>
                        </div>
                        <span class="text-sm text-purple-300 font-bold">Open →</span>
                    </div>
                `;
                card.addEventListener('click', () => {
                    window.location.assign(appGroupUrl(group.id));
                });
                groupsView.appendChild(card);
            });
        }

        async function createGroupForCurrentUser(user) {
            const displayName = String(createInput.value || '').trim();
            if (!displayName) {
                createError.textContent = 'Enter a group name first.';
                createError.classList.remove('hidden');
                createInput.focus();
                return;
            }

            const slug = formatGroupSlug(displayName);
            if (!slug) {
                createError.textContent = 'Use at least one letter or number in the group name.';
                createError.classList.remove('hidden');
                createInput.focus();
                return;
            }

            createError.classList.add('hidden');
            createButton.disabled = true;
            createButton.textContent = 'Creating...';

            try {
                const groupRef = doc(db, 'groups', slug);
                const existing = await getDoc(groupRef);
                if (existing.exists()) {
                    throw new Error('This group name is already taken. Try another one.');
                }
                const ownerEmail = normalizeEmail(user.email);
                await setDoc(groupRef, {
                    id: slug,
                    name: displayName,
                    ownerUid: user.uid,
                    ownerEmail,
                    createdAt: serverTimestamp()
                });
                await setDoc(doc(db, 'groups', slug, 'members', user.uid), {
                    role: 'owner',
                    email: ownerEmail,
                    displayName: user.displayName || ownerEmail || 'Owner',
                    invitedAt: serverTimestamp(),
                    joinedAt: serverTimestamp()
                });
                window.location.assign(appGroupUrl(slug));
            } catch (error) {
                createError.textContent = error?.message || 'Could not create the group right now.';
                createError.classList.remove('hidden');
                createButton.disabled = false;
                createButton.textContent = 'Create and open group';
            }
        }

        (async function bootstrapGroups() {
            try {
                await tryCompleteEmailSignInOnGroups();
            } catch (_) {}
            onAuthStateChanged(auth, async (user) => {
            // #region agent log
            fetch('http://127.0.0.1:7908/ingest/943deae8-0938-4155-ab85-8e8398203a4e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9fd7f9'},body:JSON.stringify({sessionId:'9fd7f9',runId:'run1',hypothesisId:'H4',location:'groups.html:onAuthStateChanged:entry',message:'auth state on groups',data:{hasUser:!!user,hasUid:!!user?.uid},timestamp:Date.now()})}).catch(()=>{});
            // #endregion
            // #region agent log
            fetch('http://127.0.0.1:7908/ingest/943deae8-0938-4155-ab85-8e8398203a4e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9fd7f9'},body:JSON.stringify({sessionId:'9fd7f9',runId:'run1',hypothesisId:'H9',location:'groups.html:onAuthStateChanged:runtimeConfig',message:'runtime firebase config snapshot',data:{projectId:db?.app?.options?.projectId||'',authDomain:db?.app?.options?.authDomain||'',currentHost:window.location.host||''},timestamp:Date.now()})}).catch(()=>{});
            // #endregion
            if (!user) {
                window.location.replace(indexBasePath());
                return;
            }

            accountEmail.textContent = `Signed in as ${user.email || 'your account'}`;
            setLoadingState('Preparing your workspace...', 'Checking your account and groups.');
            loadingView.classList.remove('hidden');
            groupsView.classList.add('hidden');
            noGroupsView.classList.add('hidden');

            const groups = await fetchAccessibleGroupsForCurrentUser(user);
            // #region agent log
            fetch('http://127.0.0.1:7908/ingest/943deae8-0938-4155-ab85-8e8398203a4e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9fd7f9'},body:JSON.stringify({sessionId:'9fd7f9',runId:'run1',hypothesisId:'H5',location:'groups.html:onAuthStateChanged:postDiscovery',message:'routing decision input',data:{resolvedGroupCount:groups.length,resolvedGroupIds:groups.map(g=>g.id)},timestamp:Date.now()})}).catch(()=>{});
            // #endregion
            const manageMode = isManageMode();
            if (groups.length === 1 && !manageMode) {
                setLoadingState(`Opening ${groups[0].name || groups[0].id}...`, 'Taking you to your group now.');
                // #region agent log
                fetch('http://127.0.0.1:7908/ingest/943deae8-0938-4155-ab85-8e8398203a4e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9fd7f9'},body:JSON.stringify({sessionId:'9fd7f9',runId:'run1',hypothesisId:'H5',location:'groups.html:onAuthStateChanged:autoRedirect',message:'auto redirecting to single group',data:{targetGroupId:groups[0].id},timestamp:Date.now()})}).catch(()=>{});
                // #endregion
                await sleep(420);
                window.location.replace(appGroupUrl(groups[0].id));
                return;
            }
            loadingView.classList.add('hidden');
            if (groups.length > 1 || (manageMode && groups.length >= 1)) {
                renderGroups(groups);
                groupsView.classList.remove('hidden');
                return;
            }
            noGroupsView.classList.remove('hidden');
            });
        })();

        createButton.addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) return;
            await createGroupForCurrentUser(user);
        });

        createInput.addEventListener('keydown', async (event) => {
            if (event.key !== 'Enter') return;
            event.preventDefault();
            const user = auth.currentUser;
            if (!user) return;
            await createGroupForCurrentUser(user);
        });

        signOutButton.addEventListener('click', async () => {
            await signOut(auth);
            window.location.replace(indexBasePath());
        });

        document.getElementById('brand-home-btn')?.addEventListener('click', goBrandHome);
    </script>
</body>
</html>
