<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow">
    <title>404: Magic Friendz</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
    <style>body{background:#0f172a;color:#e2e8f0;font-family:ui-sans-serif,system-ui,sans-serif;margin:0}</style>
    <style>
        .glass { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .text-gradient { background: linear-gradient(to right, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .mf-404-bg {
            background-image: linear-gradient(to bottom, rgba(15, 23, 42, 0.92), rgba(15, 23, 42, 0.98)),
                url('https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        @keyframes mf404Float {
            0%, 100% { transform: translateY(0) rotate(-6deg); }
            50% { transform: translateY(-12px) rotate(-3deg); }
        }
        @keyframes mf404FloatAlt {
            0%, 100% { transform: translateY(0) rotate(8deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        @keyframes mf404Pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .mf-404-card { animation: mf404Float 5s ease-in-out infinite; }
        .mf-404-card-alt { animation: mf404FloatAlt 6s ease-in-out infinite; }
        .mf-404-glow { animation: mf404Pulse 3s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen mf-404-bg text-slate-200 font-sans antialiased overflow-x-hidden flex flex-col items-center justify-center p-4 sm:p-6 text-center relative">
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-purple-900/25 via-transparent to-transparent pointer-events-none"></div>
    <div class="absolute top-1/4 -left-16 w-48 h-64 rounded-2xl bg-gradient-to-br from-purple-600/20 to-pink-600/10 border border-purple-500/20 mf-404-glow blur-sm pointer-events-none" aria-hidden="true"></div>
    <div class="absolute bottom-1/4 -right-12 w-40 h-56 rounded-2xl bg-gradient-to-br from-amber-600/15 to-red-600/10 border border-amber-500/20 mf-404-glow pointer-events-none" style="animation-delay: 1.2s" aria-hidden="true"></div>

    <main class="relative z-10 w-full max-w-lg mx-auto">
        <div class="flex items-center justify-center gap-2 mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-500"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
            <span class="text-sm font-bold tracking-tight text-slate-300">Magic<span class="text-purple-500">Friendz</span></span>
        </div>

        <div class="relative h-36 sm:h-40 mb-6 flex items-center justify-center">
            <div class="absolute left-4 sm:left-8 top-2 w-24 sm:w-28 h-32 sm:h-36 glass rounded-xl border border-amber-500/30 shadow-xl mf-404-card-alt opacity-80 flex items-center justify-center" aria-hidden="true">
                <span class="text-3xl">🃏</span>
            </div>
            <div class="relative z-10 w-28 sm:w-32 h-40 sm:h-44 glass rounded-2xl border-2 border-purple-500/50 shadow-[0_0_40px_rgba(168,85,247,0.35)] mf-404-card flex flex-col items-center justify-center p-3 bg-slate-900/80">
                <p class="text-[9px] font-black uppercase tracking-widest text-purple-400 mb-1">Milled</p>
                <p class="text-4xl sm:text-5xl font-black text-white leading-none">404</p>
                <p class="text-[8px] font-bold text-slate-500 mt-1 uppercase">Page not found</p>
            </div>
            <div class="absolute right-4 sm:right-8 top-6 w-20 sm:w-24 h-28 sm:h-32 glass rounded-xl border border-red-500/25 shadow-lg mf-404-card opacity-70 flex items-center justify-center" style="animation-delay: 0.8s" aria-hidden="true">
                <span class="text-2xl grayscale">💀</span>
            </div>
        </div>

        <h1 class="text-2xl sm:text-3xl font-extrabold text-white mb-2 leading-tight">
            You've been <span class="text-gradient">countered</span>
        </h1>
        <p class="text-sm sm:text-base text-slate-400 mb-6 leading-relaxed max-w-md mx-auto">
            That URL doesn't exist in this plane. Check the link, or head back to your playgroup tracker.
        </p>

        <p class="text-xs text-purple-300/80 italic mb-6">“I had a path to victory, but the page fizzled.”</p>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/" class="w-full sm:w-auto inline-flex items-center justify-center bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white px-8 py-3.5 rounded-full text-sm font-bold transition shadow-lg shadow-purple-500/30 min-h-[48px]">
                Go to Magic Friendz
            </a>
            <a href="/" class="w-full sm:w-auto inline-flex items-center justify-center bg-slate-800/90 hover:bg-slate-700 text-slate-200 border border-slate-600 px-6 py-3.5 rounded-full text-sm font-bold transition min-h-[48px]">
                Enter a group
            </a>
        </div>
    </main>
</body>
</html>
